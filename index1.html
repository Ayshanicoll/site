<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquete Rápida</title>
    <style>
        /* CSS: Estilizando a página para ficar moderna e centralizada */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .poll-card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .options-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn-vote {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            flex: 1;
        }

        .btn-vote:hover:not(:disabled) {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        .btn-vote:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Estilo para quando o botão for desativado (já votou) */
        .btn-vote:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            color: #666;
        }

        .message {
            margin-top: 25px;
            font-size: 16px;
            color: #28a745;
            font-weight: bold;
            display: none; /* Escondido por padrão */
        }

        .error {
            color: #dc3545;
        }
    </style>
</head>
<body>

    <div class="poll-card">
        <h1>Você está bem?</h1>
        
        <div class="options-container" id="opcoes">
            <button class="btn-vote" data-resposta="sim">Sim</button>
            <button class="btn-vote" data-resposta="nao">Não</button>
        </div>

        <div id="mensagem" class="message"></div>
    </div>

    <script>
        // JavaScript: A lógica e a "inteligência" do Front-end
        document.addEventListener('DOMContentLoaded', () => {
            const botoes = document.querySelectorAll('.btn-vote');
            const areaMensagem = document.getElementById('mensagem');

            // 1. Verifica se o usuário já votou olhando o localStorage do navegador
            if (localStorage.getItem('voto_registrado')) {
                bloquearEnquete("Você já votou nesta enquete. Obrigado!");
            }

            // 2. Adiciona a ação de clique nos botões
            botoes.forEach(botao => {
                botao.addEventListener('click', async (evento) => {
                    // Pega a resposta escolhida (sim ou nao) do botão clicado
                    const respostaEscolhida = evento.target.getAttribute('data-resposta');

                    // ==========================================
                    // AQUI ENTRARÁ A COMUNICAÇÃO COM O BACK-END
                    // Quando o back-end estiver pronto, vamos usar a função fetch() 
                    // para enviar a "respostaEscolhida" para o servidor.
                    // ==========================================

                    // Por enquanto, vamos simular que deu tudo certo:
                    
                    // 3. Salva no computador da pessoa que ela já votou
                    localStorage.setItem('voto_registrado', 'true');
                    
                    // 4. Mostra a mensagem de sucesso e bloqueia os botões
                    bloquearEnquete(`Voto "${respostaEscolhida.toUpperCase()}" computado com sucesso!`);
                });
            });

            // Função para desativar a enquete
            function bloquearEnquete(mensagemTexto) {
                botoes.forEach(b => b.disabled = true);
                areaMensagem.textContent = mensagemTexto;
                areaMensagem.style.display = 'block'; // Mostra a mensagem
            }
        });
    </script>

</body>
</html>
